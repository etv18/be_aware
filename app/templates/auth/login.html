<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beaware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100" data-bs-theme="dark">

    <div class="card border-secondary shadow-lg p-4" style="max-width: 400px; width: 100%;">
        
        <div class="card-body">
            <div class="text-center mb-4">
                <h2 class="h3 mb-1 fw-bold">Log In</h2>
                <p class="text-secondary small">
                </p>
            </div>

            <form>
                <div class="mb-3">
                    <label name="username" for="email" class="form-label small text-secondary">Username</label>
                    <input type="email" class="form-control bg-dark-subtle" id="email" placeholder="username">
                </div>
                
                <div class="my-3">
                    <label name="password" for="password" class="form-label small text-secondary">Password</label>
                    <input type="password" class="form-control bg-dark-subtle" id="password" placeholder="••••••••">
                </div>
                <div class="my-4">
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
                        Login
                    </button>
                </div>
            </form>
        </div>
        
    </div>

</body>
</html>
